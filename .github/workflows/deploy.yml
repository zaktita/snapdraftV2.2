# SnapDraft - production deploy
#
# Triggers: every push to `main`, or manual "Run workflow" (workflow_dispatch).
#
# Pipeline order:
#   1. quality      - Composer + npm ci, PHPUnit, ESLint (must pass)
#   2. build_assets - npm run build on GitHub → uploads public/build as an artifact
#   3. deploy       - SSH: git pull + composer + migrate on server → SCP artifact → optimize + optional health check
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
#   DEPLOY_PORT - set to 22 if you use default SSH (empty port can break appleboy/ssh-action)
#
# Optional: DEPLOY_HEALTHCHECK_URL (GET URL that must return 200 after deploy)
#
# If the workflow runs but "deploy" waits forever: Repo → Settings → Environments →
# "production" may require manual approval before deploy runs. Remove reviewers or
# approve the pending deployment.

name: deploy

run-name: Deploy ${{ github.ref_name }} @ ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── 1. Quality gate ────────────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Tests
        run: ./vendor/bin/phpunit

      - name: Run Frontend Lint
        run: npm run lint

  # ── 2. Build frontend on GitHub (before server pull / SCP) ─────────────────
  build_assets:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Vite production build (public/build)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: public/build
          retention-days: 7

  # ── 3. Deploy to server ────────────────────────────────────────────────────
  deploy:
    needs: build_assets
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: public/build

      - name: Pull code & install PHP deps on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            trap 'php artisan up || true' EXIT

            PREVIOUS_COMMIT="$(git rev-parse HEAD)"
            echo "$PREVIOUS_COMMIT" > /tmp/snapdraft_previous_commit

            php artisan down || true

            git fetch origin
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            php artisan migrate --force
            php artisan db:seed --class=PlanSeeder --force

      - name: Upload built assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: public/build/*
          target: ${{ secrets.DEPLOY_PATH }}/public/build
          overwrite: true
          strip_components: 2

      - name: Finalize, health-check & rollback if needed
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            trap 'php artisan up || true' EXIT

            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart

            HEALTHCHECK_URL="${{ secrets.DEPLOY_HEALTHCHECK_URL }}"

            if [ -n "$HEALTHCHECK_URL" ]; then
              HEALTH_OK=0

              for i in 1 2 3; do
                sleep 3
                if curl -fsS --max-time 10 "$HEALTHCHECK_URL" >/dev/null; then
                  HEALTH_OK=1
                  break
                fi
                echo "Health check attempt $i/3 failed"
              done

              if [ "$HEALTH_OK" -ne 1 ]; then
                PREVIOUS_COMMIT="$(cat /tmp/snapdraft_previous_commit)"
                echo "Rolling back to $PREVIOUS_COMMIT"

                git reset --hard "$PREVIOUS_COMMIT"
                composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
                php artisan migrate --force

                php artisan optimize:clear
                php artisan config:cache
                php artisan route:cache
                php artisan view:cache
                php artisan queue:restart

                exit 1
              fi
            else
              echo "DEPLOY_HEALTHCHECK_URL not set - skipping health check"
            fi

            php artisan up
